name: Smart Test Suites (Changed Files)

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      unit: ${{ steps.filter.outputs.unit }}
      base-operations: ${{ steps.filter.outputs.base-operations }}
      database: ${{ steps.filter.outputs.database }}
      integration: ${{ steps.filter.outputs.integration }}
      e2e: ${{ steps.filter.outputs.e2e }}
      services: ${{ steps.filter.outputs.services }}
      components: ${{ steps.filter.outputs.components }}
      run-all: ${{ steps.filter.outputs.run-all }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            unit:
              - 'test/unit/**'
              - 'src/store/**'
              - 'src/components/Settings/**'
              - 'src/components/Layout/**'
            base-operations:
              - 'test/base-operations/**'
              - 'src/modules/base-operations/**'
              - 'src/components/BaseStation/**'
              - 'src/views/BaseStationView.jsx'
            database:
              - 'test/database/**'
              - 'src/services/storage.js'
              - 'src/shared/services/database/**'
            integration:
              - 'test/integration/**'
              - 'src/modules/**'
              - 'src/shared/store/**'
            e2e:
              - 'test/e2e/**'
              - 'src/views/**'
              - 'src/App.jsx'
            services:
              - 'test/services/**'
              - 'src/services/import-export/**'
            components:
              - 'test/components/**'
              - 'src/components/Shared/**'
              - 'src/design-system/**'
            run-all:
              - 'package.json'
              - 'vitest.config*.js'
              - 'test-runner.js'
              - '.github/workflows/**'

  test-changed-suites:
    name: ${{ matrix.suite }} Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        suite:
          - unit
          - base-operations
          - database
          - integration
          - e2e
          - services
          - components
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check if suite should run
        id: should-run
        env:
          RUN_ALL: ${{ needs.detect-changes.outputs.run-all }}
          UNIT: ${{ needs.detect-changes.outputs.unit }}
          BASE_OPERATIONS: ${{ needs.detect-changes.outputs.base-operations }}
          DATABASE: ${{ needs.detect-changes.outputs.database }}
          INTEGRATION: ${{ needs.detect-changes.outputs.integration }}
          E2E: ${{ needs.detect-changes.outputs.e2e }}
          SERVICES: ${{ needs.detect-changes.outputs.services }}
          COMPONENTS: ${{ needs.detect-changes.outputs.components }}
        run: |
          SUITE="${{ matrix.suite }}"
          if [[ "$RUN_ALL" == "true" ]]; then
            echo "result=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          VAR_NAME=$(echo "$SUITE" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          VALUE=$(eval "echo \$$VAR_NAME")
          echo "result=${VALUE}" >> $GITHUB_OUTPUT
      - name: Run ${{ matrix.suite }} test suite
        if: steps.should-run.outputs.result == 'true'
        run: npm run test:suite:${{ matrix.suite }}
        continue-on-error: true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            test-results/
            *.log
          retention-days: 7
          if-no-files-found: ignore

  smart-test-summary:
    name: Smart Test Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, test-changed-suites]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "# Smart Test Suite Results 🎯" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Only affected test suites were run based on changed files." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note:** Tests are informational only and do not block PR merges" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Suites Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.detect-changes.outputs.run-all }}" == "true" ]; then
            echo "⚠️ **All suites run** (core files changed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Suite | Run | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Unit | ${{ needs.detect-changes.outputs.unit == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Base Operations | ${{ needs.detect-changes.outputs.base-operations == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Database | ${{ needs.detect-changes.outputs.database == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Integration | ${{ needs.detect-changes.outputs.integration == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| E2E | ${{ needs.detect-changes.outputs.e2e == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Services | ${{ needs.detect-changes.outputs.services == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Components | ${{ needs.detect-changes.outputs.components == 'true' && '✅' || '⏭️' }} | ${{ needs.test-changed-suites.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ = Run, ⏭️ = Skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          exit 0

  comment-on-fail:
    name: Comment on PR if tests fail
    runs-on: ubuntu-latest
    needs: [test-changed-suites]
    if: needs.test-changed-suites.result == 'failure' # only run if the matrix test job collectively failed
    steps:
      - name: Create PR comment about test suite failure
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ❌ **Some test suite(s) failed!**
            These failed tests do NOT block merges, but you should review the test results.
            See the workflow run for details: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).
